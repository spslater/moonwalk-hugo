{{ define "main" }}
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  <ul>
    {{ range .Pages }}
      {{ $taxonomy :=  (index .Site.Taxonomies.tags (.Page.LinkTitle | lower)) }}
      <li><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a> - {{ $taxonomy.Count }} posts </li>
    {{ end }}
  </ul>
{{ end }}
